<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2E7DBB;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        .icon-container {
            width: 90vw;
            height: 90vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            background: white;
            border-radius: 20%; /* Rounded corners for the icon base */
        }
        img {
            height: 220%; /* Zoom in more */
            width: auto;
            position: absolute;
            left: -15%; /* Shift to center the leaf */
        }
    </style>
</head>
<body>
    <div class="icon-container">
        <img src="logotipo.jpeg" alt="Logo Leaf">
    </div>
</body>
</html>
